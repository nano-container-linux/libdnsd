name: CI

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pkgx
        run: |
          set -eux
          curl -fsSL https://pkgx.dev/install.sh | bash
          echo "export PATH=$HOME/.local/bin:$PATH" >> $GITHUB_ENV

      - name: Run tests via pkgx dev
        run: |
          set -eux
          cd libdnsd
          pkgx dev -- go test ./...